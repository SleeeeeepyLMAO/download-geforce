<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Download</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #0f172a;
      font-family: Arial, sans-serif;
    }

    button {
      padding: 16px 28px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      background: #22c55e;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }
  </style>
</head>
<body>

<button onclick="downloadLatest()">Download</button>

<script>
async function downloadLatest() {
  const user = "SleeeeeepyLMAO";
  const repo = "download-geforce";

  try {
    const res = await fetch(`https://api.github.com/repos/${user}/${repo}/releases/latest`);
    const data = await res.json();

    if (!data.assets || data.assets.length === 0) {
      alert("No files found in latest release.");
      return;
    }

    // Find first .exe file
    const exe = data.assets.find(a => a.name.endsWith(".exe")) || data.assets[0];

    if (!exe) {
      alert("No downloadable file found.");
      return;
    }

    // Redirect to download
    window.location.href = exe.browser_download_url;

  } catch (err) {
    alert("Failed to fetch release.");
    console.error(err);
  }
}
</script>

</body>
</html>
