<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Download Page</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      flex-direction: column;
      gap: 12px;
    }

    .btn {
      padding: 15px 25px;
      background: #4CAF50;
      color: white;
      text-decoration: none;
      font-size: 18px;
      border-radius: 8px;
      cursor: pointer;
    }

    .btn:hover {
      background: #45a049;
    }

    .btn.disabled {
      background: #555;
      cursor: not-allowed;
      pointer-events: none;
    }

    #version {
      font-size: 13px;
      color: #aaa;
    }
  </style>
</head>
<body>

  <a id="download-btn" class="btn disabled" href="#">Loading...</a>
  <span id="version"></span>

  <script>
    // ✏️ Replace with your GitHub username and repo name
    const GITHUB_USER = "SleeeeeepyLMAO";
    const GITHUB_REPO = "download-geforce";

    const btn = document.getElementById("download-btn");
    const versionLabel = document.getElementById("version");

    async function fetchLatestRelease() {
      try {
        const res = await fetch(
          `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/releases/latest`
        );

        if (!res.ok) throw new Error("Release not found");

        const data = await res.json();

        // Find the first .exe asset
        const exeAsset = data.assets.find(a => a.name.endsWith(".exe"));

        if (!exeAsset) throw new Error("No .exe file found in latest release");

        btn.href = exeAsset.browser_download_url;
        btn.textContent = `Download ${exeAsset.name}`;
        btn.classList.remove("disabled");
        versionLabel.textContent = `Version: ${data.tag_name}`;
      } catch (err) {
        btn.textContent = "Download Unavailable";
        versionLabel.textContent = err.message;
      }
    }

    fetchLatestRelease();
  </script>

</body>
</html>
