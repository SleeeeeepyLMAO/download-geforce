<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Download</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@500;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --panel: #111;
      --border: #1f1f1f;
      --green: #39ff14;
      --green-dim: #1a7a00;
      --text: #c8c8c8;
      --muted: #555;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(57,255,20,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(57,255,20,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 40px;
      width: 100%;
      max-width: 480px;
      position: relative;
    }

    .card::before {
      content: '';
      position: absolute;
      top: -1px; left: 20px; right: 20px;
      height: 2px;
      background: var(--green);
      border-radius: 0 0 4px 4px;
      box-shadow: 0 0 16px var(--green);
    }

    .label {
      font-size: 11px;
      color: var(--green);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    h1 {
      font-family: 'Rajdhani', sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 32px;
      letter-spacing: 1px;
    }

    .file-box {
      background: #0d0d0d;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 16px 18px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 14px;
      min-height: 58px;
    }

    .file-icon { font-size: 22px; flex-shrink: 0; }

    .file-info { flex: 1; overflow: hidden; }

    .file-name {
      font-size: 14px;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .file-meta { font-size: 11px; color: var(--muted); margin-top: 3px; }

    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      background: transparent;
      border: 1px solid var(--green);
      color: var(--green);
      font-family: 'Share Tech Mono', monospace;
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-align: center;
      text-decoration: none;
      border-radius: 3px;
      cursor: pointer;
      transition: background 0.15s, box-shadow 0.15s, color 0.15s;
    }

    .btn:hover {
      background: var(--green);
      color: #000;
      box-shadow: 0 0 20px rgba(57,255,20,0.3);
    }

    .btn.disabled {
      border-color: var(--muted);
      color: var(--muted);
      pointer-events: none;
    }

    .status {
      margin-top: 18px;
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      letter-spacing: 1px;
    }

    .status.error { color: #ff4444; }
    .status.ok    { color: var(--green-dim); }

    .blink { animation: blink 1s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }
  </style>
</head>
<body>

<div class="card">
  <div class="label">Latest Release</div>
  <h1>Download</h1>

  <div class="file-box">
    <div class="file-icon">📦</div>
    <div class="file-info">
      <div class="file-name" id="file-name">Scanning repo<span class="blink">_</span></div>
      <div class="file-meta" id="file-meta">&nbsp;</div>
    </div>
  </div>

  <a id="dl-btn" class="btn disabled" href="#">⬇ &nbsp;Fetching...</a>
  <div class="status" id="status">Connecting to GitHub API...</div>
</div>

<script>
  // ✏️ Replace these with your GitHub username and repo name
  const GITHUB_USER = "SleeeeeepyLMAO";
  const GITHUB_REPO = "download-geforce";

  const nameEl   = document.getElementById("file-name");
  const metaEl   = document.getElementById("file-meta");
  const btnEl    = document.getElementById("dl-btn");
  const statusEl = document.getElementById("status");

  function formatBytes(bytes) {
    if (!bytes) return "";
    if (bytes < 1024) return bytes + " B";
    if (bytes < 1048576) return (bytes / 1024).toFixed(1) + " KB";
    return (bytes / 1048576).toFixed(1) + " MB";
  }

  async function init() {
    try {
      // Step 1: Try release assets first
      const relRes = await fetch(
        `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/releases/latest`
      );

      if (relRes.ok) {
        const rel = await relRes.json();
        const asset = rel.assets.find(a =>
          !a.name.endsWith(".zip") && !a.name.endsWith(".tar.gz")
        ) || rel.assets[0];

        if (asset) {
          nameEl.textContent = asset.name;
          metaEl.textContent = `${formatBytes(asset.size)} · ${rel.tag_name}`;
          btnEl.href = asset.browser_download_url;
          btnEl.textContent = "⬇  Download";
          btnEl.setAttribute("download", asset.name);
          btnEl.classList.remove("disabled");
          statusEl.textContent = `Latest release: ${rel.tag_name}`;
          statusEl.className = "status ok";
          return;
        }
      }

      // Step 2: Fallback — scan repo root for any non-index file
      const contRes = await fetch(
        `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/`
      );

      if (!contRes.ok) throw new Error(`Repo not accessible (${contRes.status})`);

      const files = await contRes.json();
      const target = files.find(f =>
        f.type === "file" &&
        !f.name.toLowerCase().startsWith("index") &&
        !f.name.endsWith(".md") &&
        !f.name.endsWith(".txt")
      );

      if (!target) throw new Error("No downloadable file found in repo");

      nameEl.textContent = target.name;
      metaEl.textContent = formatBytes(target.size);
      btnEl.href = target.download_url;
      btnEl.textContent = "⬇  Download";
      btnEl.setAttribute("download", target.name);
      btnEl.classList.remove("disabled");
      statusEl.textContent = "Found in repo root";
      statusEl.className = "status ok";

    } catch (err) {
      nameEl.textContent = "Not found";
      metaEl.textContent = "";
      btnEl.textContent = "Unavailable";
      btnEl.classList.add("disabled");
      statusEl.textContent = err.message;
      statusEl.className = "status error";
    }
  }

  init();
</script>

</body>
</html>
